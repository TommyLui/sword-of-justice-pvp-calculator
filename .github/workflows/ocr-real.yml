name: Run OCR Real-Image Baseline

on:
  workflow_dispatch:

jobs:
  ocr-real:
    runs-on: ubuntu-latest
    env:
      CI: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run OCR real-image baseline tests
        run: npm run test:ocr-real -- --retries=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocr-real-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocr-real-test-results
          path: test-results/
          retention-days: 14
